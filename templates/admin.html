<!doctype html><html lang="en"><head><meta charset="UTF-8"><title>CondensateDB Admin</title><link rel="stylesheet" href="/static/css/style.css"><script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script></head><body>
<div class="admin-layout"><aside class="sidebar"><h2>Admin Console</h2><button id="side-users" class="side-btn" onclick="switchMenu('users')">Users</button><button id="side-proteins" class="side-btn" onclick="switchMenu('proteins')">Proteins</button><button id="side-kinases" class="side-btn" onclick="switchMenu('kinases')">Kinases</button><button id="side-condensates" class="side-btn" onclick="switchMenu('condensates')">Condensates</button><button id="side-diseases" class="side-btn" onclick="switchMenu('diseases')">Diseases</button><button id="side-cmods" class="side-btn" onclick="switchMenu('cmods')">Chemical Modifiers</button><button id="side-publications" class="side-btn" onclick="switchMenu('publications')">Publications</button><button id="side-admin-logs" class="side-btn" onclick="switchMenu('admin-logs')">Admin Logs</button><button id="side-dashboard" class="side-btn" onclick="dashboard()">Statistics</button><button class="side-btn" onclick="logout()">Logout</button></aside><main class="admin-main"><div class="container" id="main"></div></main></div>
