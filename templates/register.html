<!doctype html><html lang="en"><head><meta charset="UTF-8"><title>User Registration</title><link rel="stylesheet" href="/static/css/style.css"></head><body class="auth-body">
<div class="auth-left"><h1>User Registration</h1><p>Administrator accounts are maintained in the back-office system. This page only creates standard user accounts.</p></div>
<div class="auth-card"><h2>Create Account</h2><div class="form-row"><label>Username *</label><input id="username" class="input"></div><div class="form-row"><label>Password *</label><input id="password" type="password" class="input"></div><div class="form-row"><label>Gender</label><input id="gender" class="input"></div><div class="form-row"><label>Phone</label><input id="phone" class="input"></div><div class="form-row"><label>Email</label><input id="email" class="input"></div><button class="btn primary" onclick="reg()">Register</button> <button class="btn" onclick="location.href='/login'">Back to Login</button></div>
<script>
async function reg(){const data={username:username.value.trim(),password:password.value.trim(),gender:gender.value.trim(),phone:phone.value.trim(),email:email.value.trim()};if(!data.username||!data.password){alert('Username and password are required');return}const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();alert(j.msg);if(j.code===200)location.href='/login'}
</script></body></html>
