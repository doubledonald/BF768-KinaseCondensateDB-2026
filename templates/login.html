<!doctype html><html lang="en"><head><meta charset="UTF-8"><title>CondensateDB Login</title><link rel="stylesheet" href="/static/css/style.css"></head><body class="auth-body">
<div class="auth-left"><h1>CondensateDB</h1><p>An integrated query and management platform for biomolecular condensates, proteins, kinases, diseases, chemical modifiers, and literature evidence.</p></div>
<div class="auth-card"><h2>Sign In</h2><div class="form-row"><label>Username</label><input id="username" class="input"></div><div class="form-row"><label>Password</label><input id="password" type="password" class="input"></div><label>Role</label><div class="radio"><label><input type="radio" name="role" value="User" checked> User</label><label><input type="radio" name="role" value="Administrator"> Administrator</label></div><button class="btn primary" onclick="login()">Sign In</button> <button class="btn" onclick="location.href='/register'">Register</button></div>
<script>
async function login(){const username=document.getElementById('username').value.trim(),password=document.getElementById('password').value.trim(),roleLabel=document.querySelector("input[name=role]:checked")?.value,role=roleLabel==="Administrator"?"admin":"user";if(!username||!password||!role){alert('Username, password and role are required');return}const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,role})});const j=await r.json();if(j.code!==200){alert(j.msg);return}localStorage.setItem('token',j.data.token);localStorage.setItem('user',JSON.stringify(j.data.user));location.href=role==='admin'?'/admin':'/index'}
</script></body></html>
